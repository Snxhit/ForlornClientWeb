<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forlorn - Web</title>
  <link rel="icon" type="image/svg+xml" href="./public/favicon1.svg" sizes="any">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css">

  <!-- fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/firacode/6.2.0/fira_code.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/roboto-mono@5.2.8/300.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.2.8/index.min.css">
  <link href="https://fonts.cdnfonts.com/css/inconsolata-3" rel="stylesheet">
  <!---->

  <link rel="stylesheet" href="client.css">
</head>
<body>
  <div id="parentLayout">
    <div class="terminalParent">
      <div id="terminal"></div>
      <div id="inputBar">
        <input type="text" id="inputBox" placeholder="Write a command here..." autofocus></input>
        <button id="inputSubmit">
          -->
        </button>
      </div>
    </div>
    <div id="sideParent">
      <div id="sidebar">
        <!-- coming soon -->
        <div class="exitsParent">
          <div class="exits">
            <div class="exitBox"></div>
            <div class="exitBox dirBox" id="northExit">N</div>
            <div class="exitBox"></div>
            <div class="exitBox dirBox" id="westExit">W</div>
            <div class="exitBox"></div>
            <div class="exitBox dirBox" id="eastExit">E</div>
            <div class="exitBox"></div>
            <div class="exitBox dirBox" id="southExit">S</div>
            <div class="exitBox"></div>
          </div>
        </div>
        <div class="seperator"></div>
        <div class="combatParent">
          <div class="hpBar">
            <div class="playerHpBar" id="playerHpBar"></div>
          </div>
          <div class="hpBar">
            <div class="enemyHpBar" id="enemyHpBar"></div>
          </div>
        </div>
        <div class="seperator"></div>
        <div class="expParent">
          <div class="expBarParent">
            <div class="expBar" id="expBar"></div>
          </div>
        </div>
        <div class="seperator"></div>
        <div class="statsParent">
          <div class="statRow">
            <span class="statLabel">Level:</span>
            <span class="statValue" id="levelValue">1</span>
          </div>
          <div class="statRow">
            <span class="statLabel">Trains:</span>
            <span class="statValue" id="trainsValue">0</span>
          </div>
          <div class="statRow">
            <span class="statLabel">Coins:</span>
            <span class="statValue" id="coinsValue">0</span>
          </div>
        </div>
        <button id="settings" class="settings">
          <img src="https://res.cloudinary.com/dp7g5aflo/image/upload/v1772889422/settings-cog_zxgkzv.png" alt="settings">
        </button>
      </div>
      <div class="sideLogo">
        <p class="greenGradient">Forlorn</p>
        <p class="pinkGradient">MUD</p>
      </div>
    </div>
  </div>
  <div id="settingsPanel">
    <h3 class="settingHeading">SETTINGS</h3>
    <h6 class="settingExplanation">All settings are saved locally!</h6>
    <div class="settingSeperator"></div>
    <h3 class="settingHeading">Aliases</h3>
    <h6 class="settingExplanation">Allows you to define "aliases" that can be used to shorten commands!</h6>
    <div id="aliasDiv" class="aliasDiv">
      <button class="settingsPanelButton" id="newAlias">Create new alias</button>
    </div>
    <h3 class="settingHeading">Background</h3>
    <h6 class="settingExplanation">Turns off the background image and displays solid colored background!</h6>
    <div class="backgroundImgDiv">
      <h4>Turn off background image?</h4>
      <input id="backgroundImgToggle" type="checkbox">
    </div>
    <div id="buttonsParent">
      <button class="settingsPanelButton" id="closeButton">CLOSE --></button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
